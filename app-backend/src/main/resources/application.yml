    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:ORCLCDB
    # 다른 데이터베이스 설정을 사용할 경우 아래의 url 주석을 해제하고 위의 url을 주석 처리하세요.
    # url: jdbc:oracle:thin:@localhost:1521:xe
